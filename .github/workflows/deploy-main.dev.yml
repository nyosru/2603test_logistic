name: Deploy to VPS with Git


# Триггеры запуска:
on:
  # Автоматический запуск при пуше в main
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 91.218.230.97
  VPS_USERNAME: root
  DIR: /home/2603test_logistic
  GIT_BRANCH: origin/main
  GITHUB_USERNAME: nyosru
  GIT_REPO: 2603test_logistic.git
  DOCKER_CONTAINER: 2603test_logistic

jobs:
  sms_start:
    runs-on: ubuntu-latest
    steps:
#      - name: Send deployment start notification
#        uses: appleboy/telegram-action@master
#        with:
#          to: 360209578, phpcat
#          token: ${{ secrets.TELEGRAM_TOKEN }}
#          message: |
#            🚀🚀🚀 Начинаем деплой ${{ github.repository }}
#            👨🏻‍💻 ${{ github.actor }} (${{ github.run_id }})
#            📝 ${{ github.event.head_commit.message }}
      - name: sms_vk_start
        run: |
          curl -X POST "https://api.php-cat.com/api/vk/send" \
            -H "Content-Type: application/json" \
            -d '{
              "group_name": "tech",
              "user_id": 5903492,
              "message": "🚀🚀🚀 ${{ github.repository }} Старт деплоя \n 💻 ${{ github.actor }} (${{ github.run_id }}) \n 📝 ${{ github.event.head_commit.message }} "
            }'

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy code to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY_DOCKER24 }}
          script: |
            set -e  # Выход при ошибке
            cd ${{ env.DIR }}
            git fetch --all
            git reset --hard ${{ env.GIT_BRANCH }}
            echo "✅ Код успешно обновлен"

            # Обновление зависимостей
            #docker exec ${{ env.DOCKER_CONTAINER }} composer install --no-dev --optimize-autoloader
            docker exec ${{ env.DOCKER_CONTAINER }} composer install --optimize-autoloader

            # Подготавливаем sqlite и каталоги для записи веб-процессом
            docker exec ${{ env.DOCKER_CONTAINER }} chown -R www-data:www-data  storage bootstrap/cache
            docker exec ${{ env.DOCKER_CONTAINER }} chmod -R ug+rwX storage bootstrap/cache

            # Очищаем кеш конфигов, чтобы приложение подхватило актуальные env
            docker exec ${{ env.DOCKER_CONTAINER }} php artisan optimize:clear

            # Применяем миграции без пересоздания production базы
            docker exec ${{ env.DOCKER_CONTAINER }} php artisan migrate:fresh --force --seed

            docker exec ${{ env.DOCKER_CONTAINER }} chown -R www-data:www-data database
            docker exec ${{ env.DOCKER_CONTAINER }} chmod -R 755 database


