#            📝 ${{ github.event.head_commit.message }}
#            🎉 Все задачи выполнены!
      - name: sms_vk
        run: |
          curl -X POST "https://api.php-cat.com/api/vk/send" \
            -H "Content-Type: application/json" \
            -d '{
              "group_name": "tech",
              "user_id": 5903492,
